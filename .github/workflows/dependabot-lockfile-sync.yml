name: Sync bun.lock on dependabot PRs

# Dependabot doesn't support bun, so npm version bumps update package.json
# without touching bun.lock, and CI then fails at `bun install
# --frozen-lockfile`. We regenerate bun.lock and push it back to the PR so CI
# gets real signal.
#
# Security: `bun install` runs untrusted dependency code (postinstall scripts).
# This is split into two workflows so that no untrusted code ever runs with a
# write token or secrets:
#   - THIS workflow runs on `pull_request` with a read-only token and no
#     secrets, so a malicious postinstall has nothing to steal. It only computes
#     bun.lock and uploads it as an artifact.
#   - dependabot-lockfile-apply.yml runs in the trusted base context on
#     `workflow_run`, downloads that artifact, and pushes it. It never checks
#     out or executes PR code, so holding a write token there is safe.
#
# The untrusted `bun install` runs on a hosted runner (off internal infra).
# Source reaches it via an internal-runner package job (git archive only, no
# code execution), because actions/checkout 403s on hosted runners while the
# repo is private and on the org IP allowlist.

on:
  pull_request:
    branches: [main]
    paths:
      - "package.json"

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  package:
    if: github.actor == 'dependabot[bot]'
    name: Package source
    runs-on:
      group: gusto-ubuntu-default
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4, pinned to the SHA on Gusto's org Actions allowlist
      # git archive only packages tracked files; it does not execute PR code, so
      # this is safe on the internal runner. The untrusted bun install runs on a
      # hosted runner in the compute job below.
      - name: Package source for the hosted compute job
        run: git archive --format=tar.gz -o cli-source.tar.gz HEAD
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependabot-src
          path: cli-source.tar.gz
          if-no-files-found: error
          retention-days: 1

  compute:
    if: github.actor == 'dependabot[bot]'
    name: Compute synced bun.lock
    needs: package
    # Hosted runner: bun install can execute dependency postinstall scripts, so
    # it must never touch the internal runner group. Read-only token, no secrets.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dependabot-src
      - run: tar -xzf cli-source.tar.gz
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2, pinned to the SHA on Gusto's org Actions allowlist
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install
      - name: Stage synced bun.lock for the apply workflow
        run: |
          mkdir -p synced
          cp bun.lock synced/bun.lock
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependabot-bun-lock
          path: synced/bun.lock
          if-no-files-found: error
          retention-days: 1

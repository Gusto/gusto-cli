name: Sync bun.lock on dependabot PRs

# Dependabot doesn't natively support bun, so npm bumps land package.json
# updates without touching bun.lock. CI then fails at `bun install
# --frozen-lockfile`. This workflow runs `bun install` on dependabot's PR
# branch and pushes the synced lockfile back so CI gets real signal.
#
# Runs as `pull_request_target` so we can use a GITHUB_TOKEN with write
# permissions. Gated on `github.actor == 'dependabot[bot]'` because
# `pull_request_target` checks out PR code on the base workflow, and `bun
# install` can execute postinstall scripts.

on:
  pull_request_target:
    branches: [main]
    paths:
      - "package.json"

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.14

jobs:
  sync:
    if: github.actor == 'dependabot[bot]'
    name: Sync bun.lock
    runs-on:
      group: gusto-ubuntu-default
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4, pinned to the SHA on Gusto's org Actions allowlist
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2, pinned to the SHA on Gusto's org Actions allowlist
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install
      - name: Commit + push synced bun.lock if changed
        run: |
          if git diff --quiet bun.lock; then
            echo "bun.lock already in sync, nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "Sync bun.lock with package.json"
          git push

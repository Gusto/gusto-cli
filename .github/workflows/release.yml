name: Release

on:
  push:
    tags: ["v*.*.*"]

# Needs write access to create the GitHub Release and upload binaries.
permissions:
  contents: write

env:
  BUN_VERSION: 1.3.14

jobs:
  release:
    name: Build + publish binaries
    runs-on:
      group: gusto-ubuntu-default
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2, pinned to the SHA on Gusto's org Actions allowlist
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(bun --print "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "Tag $GITHUB_REF_NAME (-> $tag) does not match package.json version $pkg" >&2
            exit 1
          fi

      - run: bun run build:all

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum gusto-darwin-arm64 gusto-darwin-x64 gusto-linux-x64 > SHA256SUMS

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Create the release if it doesn't exist, otherwise re-upload assets, so
        # re-pushing a tag or retrying a failed run is idempotent.
        run: |
          assets="dist/gusto-darwin-arm64 dist/gusto-darwin-x64 dist/gusto-linux-x64 dist/SHA256SUMS"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            # shellcheck disable=SC2086
            gh release upload "$GITHUB_REF_NAME" $assets --clobber
          else
            # shellcheck disable=SC2086
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes $assets
          fi

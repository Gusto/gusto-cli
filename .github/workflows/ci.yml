name: CI

on:
  pull_request:
  push:
    branches: [main]

# Lock down the default GITHUB_TOKEN (mirrors Gusto/embedded-react-sdk).
permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  check:
    name: Lint + Typecheck + Format + Unit & install tests
    runs-on:
      group: gusto-ubuntu-default
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2, pinned to the SHA on Gusto's org Actions allowlist
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run format:check
      - run: bun run test
      - run: bun run test:install
      # Hand the source to the smoke matrix as an artifact. Those runners are
      # GitHub-hosted (rotating IPs), so a raw `actions/checkout` of github.com
      # 403s against the org IP allowlist while the repo is internal. Artifact
      # storage is reachable, so we package here (allowlisted) and download there.
      - name: Package source for smoke matrix
        run: git archive --format=tar.gz -o cli-source.tar.gz HEAD src tests package.json bun.lock
      - uses: actions/upload-artifact@v4
        with:
          name: cli-source
          path: cli-source.tar.gz
          if-no-files-found: error
          retention-days: 1

  smoke:
    name: Smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-13]
    steps:
      # No `actions/checkout` here: these runners aren't on the org IP allowlist,
      # so cloning github.com 403s. Source arrives via the artifact from `check`.
      - uses: actions/download-artifact@v4
        with:
          name: cli-source
      - run: tar -xzf cli-source.tar.gz
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2, pinned to the SHA on Gusto's org Actions allowlist
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run test:smoke

  build:
    name: Build all platform binaries
    runs-on:
      group: gusto-ubuntu-default
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2, pinned to the SHA on Gusto's org Actions allowlist
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run build:all
      - uses: actions/upload-artifact@v4
        with:
          name: gusto-cli-binaries
          path: dist/gusto-*
          if-no-files-found: error
          retention-days: 7

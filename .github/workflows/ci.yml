name: CI

on:
  pull_request:
  push:
    branches: [main]

# Lock down the default GITHUB_TOKEN (mirrors Gusto/embedded-react-sdk).
permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  # Safe on the internal runner: git archive only packages source, it does not
  # execute PR code. The untrusted bun install runs on a hosted runner (see check).
  # Hosted runners can't do this step themselves: their IPs aren't on the org
  # allowlist, so actions/checkout 403s there. Hand the source off via artifact.
  # fetch-depth: 0 is required so the full commit history is available when
  # building the git bundle for the dco job (see dco).
  package:
    name: Package source
    runs-on:
      group: gusto-ubuntu-default
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4, pinned to the SHA on Gusto's org Actions allowlist
        with:
          fetch-depth: 0
      # Archive the full tracked tree (not a path subset): check needs the root
      # configs (tsconfig.json, eslint.config.mjs, .prettierrc.json, bunfig.toml)
      # that typecheck/lint/format/test read. Excludes .git, which no downstream
      # job needs (test:dco builds its own temp repos; install-hooks.sh exits 0
      # when .git is absent).
      - name: Package source for hosted jobs
        run: git archive --format=tar.gz -o cli-source.tar.gz HEAD
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-source
          path: cli-source.tar.gz
          if-no-files-found: error
          retention-days: 1
      # Bundle the full git history so the dco job can verify commit sign-offs
      # on a hosted runner without needing actions/checkout (which 403s on hosted
      # runners while the repo is on the org IP allowlist).
      - name: Create git bundle for DCO check
        if: github.event_name == 'pull_request'
        run: git bundle create pr-history.bundle HEAD
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: github.event_name == 'pull_request'
        with:
          name: pr-history
          path: pr-history.bundle
          if-no-files-found: error
          retention-days: 1

  dco:
    name: DCO sign-off
    if: github.event_name == 'pull_request'
    # Hosted runner: this job runs the PR's own scripts/check-dco.sh, so a fork
    # PR could otherwise execute attacker code on the internal runner group.
    # Source arrives via git bundle from the package job (see package) rather
    # than actions/checkout, which 403s on hosted runners while the repo is on
    # the org IP allowlist.
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pr-history
      - name: Restore git repository from bundle
        run: git clone pr-history.bundle workdir
      - name: Verify Signed-off-by on every commit
        working-directory: workdir
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/check-dco.sh

  # Runs untrusted PR code (bun install can execute dependency postinstall scripts),
  # so it must stay on a hosted runner, never the internal runner group. Source
  # arrives via the package artifact rather than actions/checkout (see package).
  check:
    name: Lint + Typecheck + Format + Unit & install tests
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-source
      - run: tar -xzf cli-source.tar.gz
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2, pinned to the SHA on Gusto's org Actions allowlist
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run format:check
      - run: bun run test
      - run: bun run test:install
      - run: bun run test:dco
      - run: bun run license:check

  smoke:
    name: Smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [package, check]
    strategy:
      fail-fast: false
      matrix:
        # macos-15-intel covers x86_64 darwin (macos-14 is arm64); macos-13 runners were retired.
        os: [ubuntu-latest, macos-14, macos-15-intel]
    steps:
      # No checkout: these runners 403 on github.com (see `package`). Source via artifact.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-source
      - run: tar -xzf cli-source.tar.gz
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2, pinned to the SHA on Gusto's org Actions allowlist
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run test:smoke

  build:
    name: Build all platform binaries
    # Runs untrusted PR code (bun install), so hosted runner + artifact source, not
    # the internal runner group. Consumes the package artifact (see package).
    runs-on: ubuntu-latest
    # Gate on check too so smoke/build don't burn runners when lint/tests fail.
    needs: [package, check]
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-source
      - run: tar -xzf cli-source.tar.gz
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2, pinned to the SHA on Gusto's org Actions allowlist
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run build:all
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gusto-cli-binaries
          path: dist/gusto-*
          if-no-files-found: error
          retention-days: 7

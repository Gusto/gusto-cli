name: CI

on:
  pull_request:
  push:
    branches: [main]

# Lock down the default GITHUB_TOKEN (mirrors Gusto/embedded-react-sdk).
permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  check:
    name: Lint + Typecheck + Format + Unit & install tests
    runs-on:
      group: gusto-ubuntu-default
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2, pinned to the SHA on Gusto's org Actions allowlist
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run format:check
      - run: bun run test
      - run: bun run test:install
      # Smoke runs on GitHub-hosted runners whose IPs aren't on the org allowlist,
      # so actions/checkout 403s there. Hand them the source via artifact instead.
      - name: Package source for smoke matrix
        run: git archive --format=tar.gz -o cli-source.tar.gz HEAD src tests package.json bun.lock
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-source
          path: cli-source.tar.gz
          if-no-files-found: error
          retention-days: 1

  smoke:
    name: Smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        # macos-15-intel covers x86_64 darwin (macos-14 is arm64); macos-13 runners were retired.
        os: [ubuntu-latest, macos-14, macos-15-intel]
    steps:
      # No checkout: these runners 403 on github.com (see `check`). Source via artifact.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-source
      - run: tar -xzf cli-source.tar.gz
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2, pinned to the SHA on Gusto's org Actions allowlist
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run test:smoke

  build:
    name: Build all platform binaries
    runs-on:
      group: gusto-ubuntu-default
    needs: check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2, pinned to the SHA on Gusto's org Actions allowlist
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run build:all
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gusto-cli-binaries
          path: dist/gusto-*
          if-no-files-found: error
          retention-days: 7

name: CI

on:
  pull_request:
  push:
    branches: [main]

# Lock down the default GITHUB_TOKEN (mirrors Gusto/embedded-react-sdk).
permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  dco:
    name: DCO sign-off
    if: github.event_name == 'pull_request'
    runs-on:
      group: gusto-ubuntu-default
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4, pinned to the SHA on Gusto's org Actions allowlist
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on every commit
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ -z "$BASE" ] || [ -z "$HEAD" ]; then
            echo "::error::Could not determine the PR commit range (BASE/HEAD empty)."
            exit 1
          fi
          # Materialize the list first: reading rev-list via process substitution
          # runs it in a subshell and swallows its exit code, so a bad ref would
          # let the gate pass silently. A failure here aborts the job instead.
          commits=$(git rev-list --no-merges "$BASE..$HEAD")
          if [ -z "$commits" ]; then
            echo "::error::No commits found in $BASE..$HEAD."
            exit 1
          fi
          fail=0
          while IFS= read -r sha; do
            subject=$(git show -s --format='%s' "$sha")
            author=$(git show -s --format='%ae' "$sha")
            # Bots (dependabot, github-actions) don't sign off; their PRs are exempt.
            case "$author" in
              *"[bot]@"*|*"bot@users.noreply.github.com") echo "skip bot: ${sha:0:8} $subject"; continue ;;
            esac
            # Capture (not pipe) so a git failure aborts under set -e instead of
            # masking as a missing sign-off; grep only sees a successful read.
            signoffs=$(git show -s --format='%(trailers:key=Signed-off-by,valueonly=true)' "$sha")
            if printf '%s\n' "$signoffs" | grep -qiF "<$author>"; then
              echo "ok: ${sha:0:8} $subject"
            else
              echo "MISSING DCO sign-off matching author <$author>: ${sha:0:8} $subject"
              fail=1
            fi
          done <<< "$commits"
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more commits lack a Signed-off-by line matching the commit author. Run 'git rebase --signoff $BASE' and force-push. See CONTRIBUTING.md#developer-certificate-of-origin."
            exit 1
          fi

  check:
    name: Lint + Typecheck + Format + Unit & install tests
    runs-on:
      group: gusto-ubuntu-default
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4, pinned to the SHA on Gusto's org Actions allowlist
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2, pinned to the SHA on Gusto's org Actions allowlist
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run format:check
      - run: bun run test
      - run: bun run test:install
      # Smoke runs on GitHub-hosted runners whose IPs aren't on the org allowlist,
      # so actions/checkout 403s there. Hand them the source via artifact instead.
      - name: Package source for smoke matrix
        run: git archive --format=tar.gz -o cli-source.tar.gz HEAD src tests package.json bun.lock
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-source
          path: cli-source.tar.gz
          if-no-files-found: error
          retention-days: 1

  smoke:
    name: Smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        # macos-15-intel covers x86_64 darwin (macos-14 is arm64); macos-13 runners were retired.
        os: [ubuntu-latest, macos-14, macos-15-intel]
    steps:
      # No checkout: these runners 403 on github.com (see `check`). Source via artifact.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-source
      - run: tar -xzf cli-source.tar.gz
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2, pinned to the SHA on Gusto's org Actions allowlist
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run test:smoke

  build:
    name: Build all platform binaries
    runs-on:
      group: gusto-ubuntu-default
    needs: check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4, pinned to the SHA on Gusto's org Actions allowlist
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2, pinned to the SHA on Gusto's org Actions allowlist
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run build:all
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gusto-cli-binaries
          path: dist/gusto-*
          if-no-files-found: error
          retention-days: 7
